<!DOCTYPE html>
<html lang="fi">

<head>
  <title>JSON Tehtävät</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">

  <! –– Bootstrap CSS ja JS linkitys––>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</head>
<style>
  img {
    width: 100%;
  }
</style>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-sm navbar-custom">
    <div class="container-fluid">
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Etusivu (Tehtävä 1 OSA I)</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="kolmas.html">Tehtävä 1 OSA II</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Sivun sisältö -->
  <main>
    <div class="card mb-3" style="max-width: 660px; max-height: 600px;">
      <div class="card-body" color="">
        <h1 class="card-title"><strong>Digitekniikat</strong></h1>
        <div id="vastaus">
          <script>
            // Funktio, joka rakentaa HTML:n JSON-datasta
            function naytaTiedot(data) {
              let html = "";

              // Osallistujien määrä
              html += `<p> ${data.osallistujia}</p>`;

              // Osallistujien nimet samassa lauseessa
              html += `<p> ${data.osallistujat.join(', ')}</p>`;

              // Alkamisaika ja loppumisaika
              html += `<p> ${data.kesto_aika}</p>`;

              // Kesto viikkoina
              html += `<p> ${data.kesto_viikkoina} viikkoa</p>`;

              // Lisätään kuva lopuksi
              html += `<img src="${data.kuva}" class="smaller-image mt-3">`;

              // Lisätään luotu HTML sivun diviin
              document.getElementById("vastaus").innerHTML = html;
            }


            fetch('https://vynguyen-hh.github.io/digitekniikat-json/toteutus.JSON')
              // Muunnetaan vastaus JS Olio muotoon
              .then(function (response) {
                return response.json();
              })

              //Käsitellään muunnettu (eli JSON muotoinen) vastaus 
              // Kutsutaan funktiota kerro()ja välitetään sille json-vastaus
              .then(function (responseJson) {
                naytaTiedot(responseJson);
              })

              // Jos hakemisessa tuli jokin virhe: 
              .catch(function (error) {
                document.getElementById("vastaus").innerHTML = "<p>Tietoa ei pystytä hakemaan</p>";
              })
          </script>
        </div>
      </div>
    </div>

  </main>

</body>

</html>
