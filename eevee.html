</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-sm navbar-custom">
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">

    </nav>

    <!-- Sivun sisältö -->
    <main>
        <div class="card mb-3" id="poke-card" style="max-width: 660px; max-height: 600px;">
            <div class="card-body">
                <h1>Pokemon haku</h1>
                <input type="text" id="pokemonName" placeholder="Enter Pokemon name">
                <button onclick="poke()">Hae</button>
                <br><br>

                <!-- "Käännä" -painikkeelle -->
                <div id="painikealue"></div><br>

                <!-- Lisäominaisuuksille -->
                <div id="ominaisuudet"></div>

                <!-- Näytetään Pokémonin nimi  -->
                <div id="nimi"></div>

                <!-- Näytetään Pokémonin kuva -->
                <p id="kuva2"></p>
            </div>
        </div>

        <script>
            // Globaalit muuttujat
            let pokemonData; // tallennetaan haettu Pokémon objekti
            let name = "";   // tallennetaan haetun Pokémonin nimi

            // Funktio, joka hakee Pokémonin tiedot
            function poke() {
                const pokeName = document.getElementById("pokemonName").value.toLowerCase();
                name = document.getElementById("pokemonName").value;

                // Haetaan tiedot PokeAPI:sta
                fetch(`https://pokeapi.co/api/v2/pokemon/${pokeName}`)
                    .then(response => {
                        if (!response.ok) throw new Error("Not found"); // jos nimi ei löydy
                        return response.json(); // muunnetaan JSON-olioksi
                    })
                    .then(responseJson => {
                        pokemonData = responseJson; // tallennetaan globaaliksi
                        pokekuva(); // näytetään etukuvan kuva ja nimi
                    })
                    .catch(() => {
                        // Jos virhe: tyhjennetään kuvat, napit ja ominaisuudet
                        document.getElementById("painikealue").innerHTML = "";
                        document.getElementById("ominaisuudet").innerHTML = "";
                        document.getElementById("nimi").innerHTML = "Pokemonia ei löytynyt";
                        document.getElementById("kuva2").innerHTML = "";
                    });
            }

            // Funktio, joka näyttää etukuvan ja luo "Käännä" -painikkeen
            function pokekuva() {
                let pokeurl = pokemonData.sprites.front_default;

                document.getElementById("kuva2").innerHTML = "<img src='" + pokeurl + "'>";
                document.getElementById("nimi").innerHTML = "<b>" + name + "</b>";
                document.getElementById("pokemonName").value = "";

                // Lisätään "Käännä" -painike
                document.getElementById("painikealue").innerHTML =
                    "<button onclick='kaanna()'>Käännä</button>";

                // Tyhjennetään mahdolliset aiemmat lisäominaisuudet
                document.getElementById("ominaisuudet").innerHTML = "";
            }

            // Funktio, joka näyttää Pokémonin selän ja lisäominaisuudet
            function kaanna() {
                if (!pokemonData) return; // turvatarkistus

                // Näytetään 3 lisäominaisuutta
                document.getElementById("ominaisuudet").innerHTML =
                    document.getElementById("ominaisuudet").innerHTML =
                    "<p><b>Height: " + pokemonData.height + "</b></p>" +
                    "<p><b>Weight: " + pokemonData.weight + "</b></p>" +
                    "<p><b>Move Name: " + pokemonData.moves[0].move.name + "</b></p>";

                let backUrl = pokemonData.sprites.back_default;
                document.getElementById("kuva2").innerHTML = "<img src='" + backUrl + "'>";
            }
        </script>
    </main>

</body>

</html>
